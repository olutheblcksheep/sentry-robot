services:
  - type: web
    name: sentry-cloud-gateway
    runtime: python
    rootDir: cloud-gateway
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:socket_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
